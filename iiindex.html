<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Bootstrap Jumbotron Demo</title>
  <!-- Bootstrap 4 CSS -->
  <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
</head>
<body>

  <!-- Full-width Jumbotron -->
  <div class="jumbotron jumbotron-fluid bg-primary text-white text-center mb-0">
    <div class="container">
      <h1 class="display-4">Bootstrap 4 Tutorial</h1>
      <p class="lead">This is a full-width Jumbotron example</p>
    </div>
  </div>

  <!-- Tutorial Section -->
  <div class="container my-5">
    <h2 class="mb-4">Image Utilities Demo</h2>
    <div class="row">
      <div class="col-md-4 text-center mb-4">
        <h5>Rounded Corners</h5>
        <img src="https://picsum.photos/200" class="rounded" alt="Rounded">
      </div>
      <div class="col-md-4 text-center mb-4">
        <h5>Circle</h5>
        <img src="https://picsum.photos/200" class="rounded-circle" alt="Circle">
      </div>
      <div class="col-md-4 text-center mb-4">
        <h5>Thumbnail</h5>
        <img src="https://picsum.photos/200" class="img-thumbnail" alt="Thumbnail">
      </div>
    </div>

    <h2 class="mb-4">Responsive Image</h2>
    <img src="https://picsum.photos/800/400" class="img-fluid" alt="Responsive">
  </div>

  <!-- Bootstrap JS -->
  <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
  <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.bundle.min.js"></script>
</body>
</html>
